services:
  - type: web
    name: sparkly-backend
    runtime: docker
    plan: free
    repo: https://github.com/ТВОЙ_ГИТХАБ_НИК/ТВОЙ_РЕПОЗИТОРИЙ
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_PATH
        value: /app/data/messenger.db
    disk:
      name: sparkly-db
      mountPath: /app/data
      sizeGB: 1
    
  - type: web
    name: sparkly-frontend
    runtime: docker
    plan: free
    repo: https://github.com/ТВОЙ_ГИТХАБ_НИК/ТВОЙ_РЕПОЗИТОРИЙ
    branch: main
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    envVars:
      - key: VITE_API_URL
        value: https://sparkly-backend.onrender.com
