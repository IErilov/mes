services:
  backend:
    build: ./backend
    container_name: messenger-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data      # для БД
      - ./uploads:/app/uploads # для аватаров
    environment:
      - DATABASE_PATH=/app/data/messenger.db
    networks:
      - messenger-network

  frontend:
    build: ./frontend
    container_name: messenger-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - messenger-network

networks:
  messenger-network:
    driver: bridge